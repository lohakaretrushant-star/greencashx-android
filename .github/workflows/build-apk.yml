name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/GreenCashX-v${{ github.run_number }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenCashX-APK
          path: release/GreenCashX-v${{ github.run_number }}.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "GreenCashX v1.0.${{ github.run_number }}"
          body: |
            ## GreenCashX Debug Build

            **Test Accounts (password: Test@1234)**
            - trushant@greencashx.com
            - gokul@greencashx.com
            - priya@greencashx.com
            - rahul@greencashx.com

            **Installation:** Download APK → Open on Android → Enable "Install from unknown sources"
          files: release/GreenCashX-v${{ github.run_number }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
